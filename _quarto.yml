project:
  type: website
  output-dir: _site
  resources:
    - robots.txt
    - images/**

lang: en

website:
  title: "Matteo's Lab"
  description: "Open research, data stories, experiments and useful tools created by Matteo Arellano."
  site-url: "https://lab.matteoarellano.com"

  image: "images/social/matteos-lab-social-card.png"

  open-graph:
    locale: en_US
    site-name: "Matteo's Lab"

  twitter-card:
    card-style: summary_large_image

  navbar:
    title: "Matteo's Lab"
    logo-href: "https://lab.matteoarellano.com"
    pinned: true

    left:
      - href: index.qmd
        text: Home

      - text: Projects
        menu:
          - href: projects/pacific-dataviz-2026/index.qmd
            text: Pacific Dataviz Challenge 2026

      - href: about.qmd
        text: About

    right:
      - text: "MatteoArellano.com"
        href: "https://matteoarellano.com"

format:
  html:
    theme:
      - cosmo
      - brand

    css: styles.css
    toc: true
    canonical-url: true
    include-in-header: includes/seo-global.html
